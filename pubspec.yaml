name: event_connect
description: Universal Event Connect Platform - A premium event ecosystem app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Firebase ──────────────────────────────────────────────
  firebase_core: ^2.31.1
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.2
  firebase_storage: ^11.7.4
  firebase_messaging: ^14.9.1
  firebase_analytics: ^10.10.4

  # ── Authentication ────────────────────────────────────────
  google_sign_in: ^6.2.1
  local_auth: ^2.3.0

  # ── HTTP & Networking ─────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── UI & Animations ───────────────────────────────────────
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  glassmorphism: ^3.0.0

  # ── QR Code ───────────────────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

  # ── Location ──────────────────────────────────────────────
  geolocator: ^11.1.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.7.0

  # ── Media ─────────────────────────────────────────────────
  image_picker: ^1.1.2
  video_player: ^2.9.1
  photo_view: ^0.14.0

  # ── Storage & Persistence ─────────────────────────────────
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ── PDF & File ────────────────────────────────────────────
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4
  share_plus: ^9.0.0

  # ── Payments ──────────────────────────────────────────────
  razorpay_flutter: ^1.3.7

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.18.0
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  timeago: ^3.7.0
  badges: ^3.1.2
  readmore: ^3.0.0

  # ── Icons ─────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_iconly: ^1.0.2
  material_symbols_icons: ^4.2719.3
  google_fonts: ^6.2.1
  image_cropper: ^12.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.1
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
